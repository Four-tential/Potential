spring:
  application:
    name: potential

  # DB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB}?serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 30000 # 30초 커넥션 대기 타임아웃
      maximum-pool-size: 50
      minimum-idle: 10
      connection-test-query: SELECT 1 # 커넥션 확인용 쿼리 선언부
      keepalive-time: 60000 # 1분 마다 상태 체크

  # Spring Cloud AWS - 로컬에서는 EC2 메타데이터가 없으므로 리전을 명시
  # fallback 기본값 제공: S3 미사용 로컬 개발 시에도 앱 기동 가능
  cloud:
    aws:
      region:
        static: ${AWS_S3_REGION:ap-northeast-2}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:local-dummy-key}
        secret-key: ${AWS_SECRET_ACCESS_KEY:local-dummy-secret}

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  # Flyway
  # migration-perf 은 local 전용 — 성능 테스트용 대량 시딩과 payment 도메인 fixture 포함
  # dev/prod 는 locations 미지정 → Flyway 기본값(classpath:db/migration)만 사용하므로 자동 제외
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# AWS S3 - fallback 기본값 제공: 실제 업로드는 실패하지만 앱 기동은 가능
aws:
  s3:
    bucket: ${AWS_S3_BUCKET:local-dev-bucket}
    region: ${AWS_S3_REGION:ap-northeast-2}
    cloudfront-domain: ${AWS_CLOUDFRONT_DOMAIN:localhost}

# JWT
jwt:
  secret:
    key: ${JWT_KEY}
    accessExpire: 1800000
    refreshExpire: 604800000

# PortOne
portone:
  api-secret: ${PORTONE_API_SECRET}
  webhook-secret: ${PORTONE_WEBHOOK_SECRET}
  store-id: ${PORTONE_STORE_ID}
  channel-key: ${PORTONE_CHANNEL_KEY}
  api-base: ${PORTONE_API_BASE:https://api.portone.io}
  sdk-timeout: ${PORTONE_SDK_TIMEOUT:10s}

payment:
  gateway:
    stub:
      enabled: false

# Member - fallback: 로컬 환경변수 미설정 시 플레이스홀더 URL 사용
member:
  default-profile-image-url: ${DEFAULT_PROFILE_IMAGE_URL:https://localhost/default-profile.png}

# SpringDocs With Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: info

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99 # P50, P95, P99 활성화
      sla:
        http.server.requests: 100ms, 200ms, 500ms, 1s, 3s # 특정 시간 내 처리 비율 확인
  prometheus:
    metrics:
      export:
        enabled: true