spring:
  application:
    name: potential

  # DB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB}?serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 30000 # 30초 커넥션 대기 타임아웃
      maximum-pool-size: 50
      minimum-idle: 10
      connection-test-query: SELECT 1 # 커넥션 확인용 쿼리 선언부
      keepalive-time: 60000 # 1분 마다 상태 체크

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  # Flyway - 엔티티 전체적 완성 이후 활성화 예정, 현재는 ddl-auto: create + data.sql 방식 사용
  flyway:
    enabled: false

  # JPA
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true  # JPA 스키마 생성 완료 후 data.sql 실행
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Data Seeding
  sql:
    init:
      mode: always        # 내장 DB가 아니어도 data.sql 실행
      encoding: UTF-8

# JWT
jwt:
  secret:
    key: ${JWT_KEY}
    accessExpire: 1800000
    refreshExpire: 60480000
    
# PortOne
portone:
  api-secret: ${PORTONE_API_SECRET}
  webhook-secret: ${PORTONE_WEBHOOK_SECRET}
  store-id: ${PORTONE_STORE_ID}
  channel-key: ${PORTONE_CHANNEL_KEY}
  api-base: ${PORTONE_API_BASE:https://api.portone.io}
  sdk-timeout: ${PORTONE_SDK_TIMEOUT:10s}

# Member
member:
  default-profile-image-url: ${DEFAULT_PROFILE_IMAGE_URL:https://bucketurl/default-profile-image.png}

# SpringDocs With Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: info

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99 # P50, P95, P99 활성화
      sla:
        http.server.requests: 100ms, 200ms, 500ms, 1s, 3s # 특정 시간 내 처리 비율 확인
  prometheus:
    metrics:
      export:
        enabled: true