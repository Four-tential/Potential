spring:
  datasource:
    url: jdbc:h2:mem:potential;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret:
    key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    accessExpire: 1800000
    refreshExpire: 60480000

portone:
  api-secret: test-api-secret
  webhook-secret: test-webhook-secret
  store-id: test-store-id
  channel-key: test-channel-key
