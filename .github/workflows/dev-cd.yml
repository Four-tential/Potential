name: Deploy (dev)

# dev 브랜치에 push 될 때만 실행 (PR 머지 포함)
on:
  push:
    branches: [ "dev" ]

# OIDC 토큰 발급 권한 (AWS 자격증명을 비밀키 없이 받기 위해 필요)
permissions:
  id-token: write
  contents: read

# 워크플로우 전체에서 사용하는 환경변수
env:
  AWS_REGION: ap-northeast-2
  ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}          # AWS 계정 ID
  ECR_REPO: ${{ secrets.DEV_ECR_REPO }}          # ECR 리포지토리 이름 (예: potential-dev)
  IMAGE_TAG: ${{ github.sha }}                   # 커밋 SHA를 이미지 태그로 사용 → 어떤 커밋이 배포됐는지 추적 가능
  EC2_INSTANCE_ID: ${{ secrets.DEV_EC2_INSTANCE_ID }}  # 배포 대상 EC2 인스턴스 ID
  CONTAINER_NAME: app                            # EC2에서 실행될 Docker 컨테이너 이름
  APP_PORT: "8080"                               # 앱이 사용하는 포트
  SPRING_PROFILE: dev                            # 컨테이너 기동 시 주입할 Spring 프로파일

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 동일 브랜치에 push가 겹치면 이전 배포를 취소하고 최신 것만 실행
    concurrency:
      group: deploy-dev
      cancel-in-progress: true

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 쉘 스크립트에 실행 권한 부여 (git에 저장될 때 실행 권한이 없는 경우 대비)
      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      # 3. AWS 자격증명 설정 (OIDC 방식 - AWS Access Key를 GitHub Secrets에 저장할 필요 없음)
      #    IAM Role(github-oidc-role)에 ECR push + SSM 명령 권한이 부여되어 있어야 함
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      # 4. Docker 이미지 빌드 & ECR push
      #    ecr-push.sh 가 빌드 완료 후 FULL_URI(레지스트리주소/리포:태그)를 출력으로 넘김
      - name: Build & Push to ECR
        id: push
        run: |
          ./scripts/ecr-push.sh

      # 5. EC2에 배포 (SSH 없이 AWS SSM으로 원격 명령 실행)
      #    FULL_URI를 받아 EC2에서 docker pull & run 수행
      - name: Deploy on EC2 via SSM
        env:
          FULL_URI: ${{ steps.push.outputs.FULL_URI }}
        run: |
          ./scripts/deploy.sh

      # 6. 배포 완료 검증 - EC2에서 실행 중인 컨테이너 목록 확인
      - name: Verify container
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${EC2_INSTANCE_ID}" \
            --parameters commands="[
              \"docker ps --format 'table {{.Names}}\\t{{.Image}}\\t{{.Status}}'\"
            ]" \
            --region $AWS_REGION --output json
