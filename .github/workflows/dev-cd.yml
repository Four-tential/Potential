name: Deploy (dev)

# dev 브랜치에 push 될 때만 실행 (PR 머지 포함)
on:
  push:
    branches: [ "dev" ]

# OIDC 토큰 발급 권한 (AWS 자격증명을 비밀키 없이 받기 위해 필요)
permissions:
  id-token: write
  contents: read

# 워크플로우 전체에서 사용하는 환경변수
env:
  AWS_REGION: ap-northeast-2
  ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}          # AWS 계정 ID
  ECR_REPO: ${{ secrets.DEV_ECR_REPO }}          # ECR 리포지토리 이름 (예: potential-dev)
  IMAGE_TAG: ${{ github.sha }}                   # 커밋 SHA를 이미지 태그로 사용 → 어떤 커밋이 배포됐는지 추적 가능
  EC2_INSTANCE_ID: ${{ secrets.DEV_EC2_INSTANCE_ID }}  # 배포 대상 EC2 인스턴스 ID
  CONTAINER_NAME: app                            # EC2에서 실행될 Docker 컨테이너 이름
  APP_PORT: "8080"                               # 앱이 사용하는 포트
  SPRING_PROFILE: dev                            # 컨테이너 기동 시 주입할 Spring 프로파일

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 동일 브랜치에 push가 겹치면 이전 배포를 취소하고 최신 것만 실행
    concurrency:
      group: deploy-dev
      cancel-in-progress: true

    steps:
      # 1. 소스코드 체크아웃
      - name: 소스코드 체크 아웃
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # 2. ARM64 크로스 빌드를 위한 QEMU 에뮬레이터 설정
      #    GitHub Actions(amd64)에서 EC2(ARM/Graviton)용 이미지를 빌드하기 위해 필요
      - name: 크로스 빌드를 위한 QEMU 셋업
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      # 3. Docker Buildx 설정 (크로스 플랫폼 빌드 + ECR 직접 push 지원)
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # 4. 쉘 스크립트에 실행 권한 부여 (git에 저장될 때 실행 권한이 없는 경우 대비)
      - name: 쉘 스크립트 실행 권한 부여
        run: chmod +x scripts/*.sh

      # 5. AWS 자격증명 설정 (OIDC 방식 - AWS Access Key를 GitHub Secrets에 저장할 필요 없음)
      #    IAM Role(github-oidc-role)에 ECR push + SSM 명령 권한이 부여되어 있어야 함
      - name: Configure AWS credentials (OIDC) 설정
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::154723391938:role/Potential-github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      # 6. Docker 이미지 빌드 & ECR push (buildx)
      #    ecr-push.sh 가 빌드 완료 후 FULL_URI(레지스트리주소/리포:태그)를 출력으로 넘김
      - name: ECR 로 이미지 빌드 완료 후 push
        id: push
        run: |
          ./scripts/ecr-push.sh

      # 7. EC2에 배포 (SSH 없이 AWS SSM으로 원격 명령 실행)
      #    FULL_URI를 받아 EC2에서 docker pull & run 수행
      - name: EC2 배포
        env:
          FULL_URI: ${{ steps.push.outputs.FULL_URI }}
        run: |
          ./scripts/deploy.sh

      # 8. 배포 완료 검증 - EC2에서 실행 중인 컨테이너 목록 확인 (SSM 명령 결과까지 동기 대기)
      - name: 배포 완료 검증 - 컨테이너 목록 확인하기
        run: |
          # SSM 명령 전송 후 CommandId 추출
          CMD_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${EC2_INSTANCE_ID}" \
            --parameters commands="[
              \"docker ps --format 'table {{.Names}}\\t{{.Image}}\\t{{.Status}}'\"
            ]" \
            --region $AWS_REGION --output json \
            --query 'Command.CommandId' --output text)

          echo "[INFO] Verify CommandId: ${CMD_ID}"

          # 명령 완료까지 대기 (최대 60초), 실패해도 로그 출력을 위해 계속 진행
          if ! aws ssm wait command-executed \
            --command-id "${CMD_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}"; then
            echo "[WARN] SSM wait failed or timed out"
          fi

          # 실행 결과(컨테이너 목록) 출력
          INVOCATION=$(aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --output json)

          STATUS=$(echo "${INVOCATION}" | jq -r '.Status')
          echo "[INFO] Verify Status: ${STATUS}"
          echo "--- stdout ---"
          echo "${INVOCATION}" | jq -r '.StandardOutputContent'

          if [ "${STATUS}" != "Success" ]; then
            echo "--- stderr ---"
            echo "${INVOCATION}" | jq -r '.StandardErrorContent'
            exit 1
          fi
